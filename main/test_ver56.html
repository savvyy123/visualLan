<!DOCTYPE html>
<!-- 一時検証用: Ver5/Ver6 PNGタイポの動作確認。確認後に削除する -->
<html lang="ja">
<head><meta charset="UTF-8" /><title>ver56 test</title></head>
<body>
<canvas id="view"></canvas>
<script type="module">
  import './sketch.js';
  const { state, params, loadTypo, TYPO_SRC } = window.__vl;
  const waitTypo = () => new Promise((r) => {
    const check = () => { if (state.typo) r(); else setTimeout(check, 50); };
    check();
  });
  loadTypo(TYPO_SRC.ver5);
  await waitTypo();
  const ver5w = state.typo.naturalWidth || state.typo.width;
  state.typo = null;
  loadTypo(TYPO_SRC.ver6);
  await waitTypo();
  const ver6w = state.typo.naturalWidth || state.typo.width;
  document.title = `ver5w=${ver5w} ver6w=${ver6w}`;
</script>
</body>
</html>
